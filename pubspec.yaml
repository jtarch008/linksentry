name: linksentry
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  receive_intent: ^0.2.0
  # Existing dependencies
  tldts: ^0.0.1-beta
  url_launcher: ^6.3.0
  fl_chart: ^0.69.0
  mobile_scanner: ^5.0.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_storage: 13.1.0 #firebase storage
  file_picker: ^8.0.7 #firebase storage
  google_sign_in: ^6.3.0
  http: ^1.6.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  archive: ^3.4.10 # for unzipping
  path_provider: ^2.1.2 # for accessing documents directory
  share_plus: ^7.2.2
  printing: ^5.12.0
  clipboard: ^0.1.3
  pdf: ^3.10.7
  shimmer: ^3.0.0
  receive_sharing_intent: ^1.8.1   # This is the correct package for receiving shared URLs
  flutter_local_notifications: ^18.0.0 # saving notification settings for each user

  # Additional dependencies for the threat engine
  path: ^1.9.0
  crypto: ^3.0.3
  cloud_functions: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/LinkSentryAppLogo.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/LinkSentryAppLogo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
